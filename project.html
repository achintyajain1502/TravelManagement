<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Travel Management - Frontend</title>
  <style>
    :root{--accent:#0066cc;--muted:#666;--bg:#f6f8fb;--card:#fff}
    *{box-sizing:border-box}
    body{font-family:Inter, system-ui, -apple-system, Roboto, 'Segoe UI', Arial; margin:0; background:var(--bg); color:#222}
    header{background:linear-gradient(90deg,var(--accent),#3aa0ff); color:#fff; padding:20px}
    .container{max-width:1000px;margin:20px auto;padding:0 16px}
    .brand{display:flex;gap:12px;align-items:center}
    .brand h1{margin:0;font-size:20px}
    nav{margin-left:auto}
    nav a{color:rgba(255,255,255,0.9);text-decoration:none;margin-left:14px}
    .grid{display:grid;grid-template-columns:1fr 340px;gap:20px}
    .card{background:var(--card);padding:16px;border-radius:10px;box-shadow:0 6px 16px rgba(2,6,23,0.06)}
    .packages{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
    .pkg{border-radius:8px;padding:12px;border:1px solid #eee}
    .pkg h3{margin:0 0 6px}
    .meta{font-size:13px;color:var(--muted)}
    .price{font-weight:700;color:var(--accent)}
    button{background:var(--accent);color:#fff;border:0;padding:8px 12px;border-radius:6px;cursor:pointer}
    button.secondary{background:#eee;color:#222}
    input,select,textarea{width:100%;padding:8px;border-radius:6px;border:1px solid #ddd}
    footer{padding:18px;text-align:center;color:var(--muted);font-size:13px}
  </style>
</head>
<body>
  <header>
    <div class="container" style="display:flex;align-items:center">
      <div class="brand">
        <h1>Travel Management System — Frontend</h1>
      </div>
      <nav>
        <a href="#home">Home</a>
        <a href="#packages">Packages</a>
        <a href="#book">Book</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="grid">
      <div>
        <section class="card" id="home">
          <h2>Welcome</h2>
          <p class="meta">This frontend calls PHP API endpoints for packages and bookings.</p>
        </section>

        <section class="card" id="packages" style="margin-top:16px">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
            <h2>Available Packages</h2>
            <div><input id="search" placeholder="Search destination or name" /></div>
          </div>
          <div class="packages" id="packagesList"></div>
        </section>

        <section class="card" style="margin-top:16px">
          <h2>Booking Records</h2>
          <div id="bookingsArea">
            <p class="meta">Loading bookings...</p>
          </div>
        </section>
      </div>

      <aside>
        <div class="card" id="book">
          <h2>Book a Package</h2>
          <form id="bookingForm">
            <label>Customer Name<input id="custName" required/></label>
            <label>Phone<input id="custPhone" required/></label>
            <label>Email<input id="custEmail" type="email" required/></label>
            <label>Package<select id="pkgSelect"></select></label>
            <label>Start Date<input id="startDate" type="date" required/></label>
            <label>Payment Mode<select id="payMode"><option>Cash</option><option>Card</option><option>UPI</option></select></label>
            <div style="margin-top:8px;display:flex;gap:8px">
              <button type="submit" id="submitBooking">Confirm Booking</button>
              <button type="button" class="secondary" id="clearBtn">Clear</button>
            </div>
          </form>
          <hr style="margin:12px 0">
          <h3>Quick Actions</h3>
          <div style="display:flex;gap:8px;margin-top:8px">
            <button id="loadPackagesBtn">Reload Packages</button>
            <button id="resetStorage" class="secondary">Reset Data</button>
          </div>
        </div>
      </aside>
    </section>
  </main>

  <footer>
    Travel Management System — Frontend
  </footer>

<script>
const API_BASE = 'api';

async function apiGetPackages(){
  const r = await fetch(`${API_BASE}/get_packages.php`);
  return r.json();
}
async function apiGetBookings(){
  const r = await fetch(`${API_BASE}/get_bookings.php`);
  return r.json();
}
async function apiCreateBooking(payload){
  const r = await fetch(`${API_BASE}/create_booking.php`,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(payload)
  });
  return r.json();
}
async function apiResetData(){
  const r = await fetch(`${API_BASE}/reset_data.php`,{method:'POST'});
  return r.json();
}

function renderPackagesList(packages,filter=''){
  const list=document.getElementById('packagesList');
  list.innerHTML='';
  const filtered=packages.filter(p=>(p.name+' '+(p.destination||'')).toLowerCase().includes(filter.toLowerCase()));
  if(!filtered.length){
    list.innerHTML='<div class="meta">No packages found.</div>';
  } else {
    filtered.forEach(p=>{
      const div=document.createElement('div');
      div.className='pkg';
      div.innerHTML=`
        <h3>${p.name}</h3>
        <div class="meta">${p.destination} • ${p.duration||'-'} days • Hotel: ${p.hotel||'-'}</div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px">
          <div class="price">₹${Number(p.price).toLocaleString()}</div>
          <div><button class="bookBtn" data-id="${p.package_id}">Book</button></div>
        </div>`;
      list.appendChild(div);
    });
  }
  const sel=document.getElementById('pkgSelect');
  sel.innerHTML='';
  packages.forEach(p=>{
    const opt=document.createElement('option');
    opt.value=p.package_id;
    opt.textContent=`${p.name} — ${p.destination} (₹${p.price})`;
    sel.appendChild(opt);
  });
}

function renderBookings(bookings){
  const area=document.getElementById('bookingsArea');
  if(!bookings||bookings.length===0){
    area.innerHTML='<p class="meta">No bookings yet.</p>';
    return;
  }
  const wrap=document.createElement('div');
  wrap.style.display='grid';
  wrap.style.gap='8px';
  bookings.forEach(b=>{
    const card=document.createElement('div');
    card.style.border='1px solid #eee';
    card.style.padding='8px';
    card.style.borderRadius='6px';
    card.innerHTML=`
      <strong>${b.customer_name}</strong> —
      <span class="meta">${b.package_name||''}</span>
      <div class="meta">Start Date: ${b.start_date||'-'} • Payment: ${b.pay_mode||'-'} • Status: ${b.status||'-'}</div>
      <div class="meta">Booked On: ${b.booking_date||''}</div>`;
    wrap.appendChild(card);
  });
  area.innerHTML='';
  area.appendChild(wrap);
}

async function loadAllPackages(filter=''){
  const list=document.getElementById('packagesList');
  list.innerHTML='<p class="meta">Loading packages...</p>';
  try{
    const data=await apiGetPackages();
    if(data.success){
      window.__packages=data.packages;
      renderPackagesList(data.packages,filter);
    } else {
      list.innerHTML=`<p class="meta">Error: ${data.error||'Unknown'}</p>`;
    }
  }catch(e){
    list.innerHTML=`<p class="meta">Error: ${e.message}</p>`;
  }
}

async function loadAllBookings(){
  const area=document.getElementById('bookingsArea');
  area.innerHTML='<p class="meta">Loading bookings...</p>';
  try{
    const data=await apiGetBookings();
    if(data.success){
      renderBookings(data.bookings);
    } else {
      area.innerHTML=`<p class="meta">Error: ${data.error||'Unknown'}</p>`;
    }
  }catch(e){
    area.innerHTML=`<p class="meta">Error: ${e.message}</p>`;
  }
}

document.addEventListener('DOMContentLoaded',()=>{
  loadAllPackages();
  loadAllBookings();

  document.getElementById('search').addEventListener('input',e=>{
    renderPackagesList(window.__packages||[],e.target.value);
  });

  document.getElementById('bookingForm').addEventListener('submit',async e=>{
    e.preventDefault();
    const payload={
      custName:document.getElementById('custName').value,
      custPhone:document.getElementById('custPhone').value,
      custEmail:document.getElementById('custEmail').value,
      packageId:parseInt(document.getElementById('pkgSelect').value),
      startDate:document.getElementById('startDate').value,
      payMode:document.getElementById('payMode').value
    };
    try{
      const r=await apiCreateBooking(payload);
      if(r.success){
        alert('Booking created: '+r.booking_id);
        document.getElementById('bookingForm').reset();
        loadAllBookings();
      } else {
        alert('Error: '+(r.error||'unknown'));
      }
    }catch(err){
      alert('Booking error: '+err.message);
    }
  });
});
</script>
</body>
</html>
